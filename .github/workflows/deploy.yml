name: Deploy

on:
  push:
    tags:
      - "v*"

permissions:
  packages: write

jobs:
  build_frontend:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        run: |
          TAG_WITHOUT_V=${TAG#v}
          docker build -t ghcr.io/${{ github.repository }}:frontend-$TAG_WITHOUT_V -t ghcr.io/${{ github.repository }}:frontend-latest -f ./src/frontend/Dockerfile ./src/frontend
          docker push ghcr.io/${{ github.repository }}:frontend-$TAG_WITHOUT_V
          docker push ghcr.io/${{ github.repository }}:frontend-latest

  build_backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ gateway, auth, wellness, mail ]
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        run: |
          TAG_WITHOUT_V=${TAG#v}
          docker build -t ghcr.io/${{ github.repository }}:${{ matrix.service }}-$TAG_WITHOUT_V -t ghcr.io/${{ github.repository }}:${{ matrix.service }}-latest -f ./src/backend/${{ matrix.service }}/Dockerfile ./src/backend/${{ matrix.service }}
          docker push ghcr.io/${{ github.repository }}:${{ matrix.service }}-$TAG_WITHOUT_V
          docker push ghcr.io/${{ github.repository }}:${{ matrix.service }}-latest

  deploy:
    if: ${{ vars.DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    needs:
      - build_frontend
      - build_backend
    steps:
      - name: Deploy the app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          port: ${{ secrets.PORT }}
          script: |
            echo "${{ secrets.PASSWORD }}" | sudo -S sh -c "
            cd mind_journal &&
            docker compose -f docker-compose.prod.yml up frontend gateway auth wellness mail --force-recreate -d &&
            docker image prune -f
            "
