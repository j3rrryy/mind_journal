name: Lint, Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./src/frontend/package-lock.json"

      - name: Install dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run ESLint linting
        working-directory: ./src/frontend
        run: npm run lint

      - name: Run Prettier formatting check
        working-directory: ./src/frontend
        run: npx prettier --check .

  lint_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Ruff linting
        uses: astral-sh/ruff-action@v3
        with:
          src: "./src/backend"
          args: "check --exclude **/proto"

      - name: Run Ruff formatting check
        uses: astral-sh/ruff-action@v3
        with:
          src: "./src/backend"
          args: "format --check --exclude **/proto"

  test_frontend:
    runs-on: ubuntu-latest
    needs: lint_frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t frontend:test -f ./src/frontend/Dockerfile.dev
          ./src/frontend

      - name: Run frontend tests
        run: |
          docker compose -f ./docker-compose.test.yml up --exit-code-from frontend frontend
          docker cp frontend_test:./src/frontend/coverage/coverage.xml ./coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          verbose: true
          fail_ci_if_error: true
          name: frontend
          flags: frontend
          slug: ${{ github.repository }}
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml

  test_backend:
    runs-on: ubuntu-latest
    needs: lint_backend
    strategy:
      matrix:
        service: [ gateway, auth, wellness, mail ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.service }}:test -f ./src/backend/${{
          matrix.service }}/Dockerfile ./src/backend/${{ matrix.service }}

      - name: Run ${{ matrix.service }} tests
        run: |
          docker compose -f ./docker-compose.test.yml up --exit-code-from ${{ matrix.service }} ${{ matrix.service }}
          docker cp ${{ matrix.service }}_test:./src/backend/${{ matrix.service }}/coverage.xml ./coverage_${{ matrix.service }}.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          verbose: true
          fail_ci_if_error: true
          name: ${{ matrix.service }}
          flags: ${{ matrix.service }}
          slug: ${{ github.repository }}
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage_${{ matrix.service }}.xml
