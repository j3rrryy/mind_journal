auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 0

common:
  replication_factor: 1
  path_prefix: /loki
  ring:
    kvstore:
      store: inmemory

ingester:
  wal:
    dir: /loki/wal

schema_config:
  configs:
    - from: 2025-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 12h
  filesystem:
    directory: /loki/chunks

limits_config:
  retention_period: 120h
  volume_enabled: true
  max_query_parallelism: 16

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 256
