volumes:
  auth_postgres_data:
  auth_redis_data:
  wellness_postgres_data:
  wellness_redis_data:
  kafka_data:
  kafka_secrets:
  loki_data:
  prometheus_data:
  grafana_data:
  certbot_conf:
  certbot_www:


networks:
  nginx:
  backend:
  auth:
  wellness:
  monitoring:


services:
  nginx:
    image: nginx:1.28.0-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nginx
    depends_on:
      - frontend
    container_name: nginx_prod

  frontend:
    image: ghcr.io/j3rrryy/mind_journal:frontend-latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - 3000
    env_file:
      - ./.env.frontend
    environment:
      - API_URL=http://gateway:8000/api
    networks:
      - nginx
    depends_on:
      - gateway
    container_name: frontend_prod

  gateway:
    image: ghcr.io/j3rrryy/mind_journal:gateway-latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - 8000
    env_file:
      - ./.env
    networks:
      - nginx
      - backend
    depends_on:
      - auth
      - wellness
      - mail
    container_name: gateway_prod

  auth:
    image: ghcr.io/j3rrryy/mind_journal:auth-latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - 50051
      - 8000
    env_file:
      - ./.env
    networks:
      - backend
      - auth
    depends_on:
      - auth_postgres
      - auth_redis
    container_name: auth_prod

  auth_postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data/
    networks:
      - auth
    hostname: postgres
    container_name: auth_postgres_prod

  auth_redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    volumes:
      - auth_redis_data:/data/
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - auth
    hostname: redis
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    container_name: auth_redis_prod

  wellness:
    image: ghcr.io/j3rrryy/mind_journal:wellness-latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - 50051
      - 8000
    env_file:
      - ./.env
    networks:
      - backend
      - wellness
    depends_on:
      - wellness_postgres
      - wellness_redis
    container_name: wellness_prod

  wellness_worker:
    image: ghcr.io/j3rrryy/mind_journal:wellness-latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - 8000
    env_file:
      - ./.env
    networks:
      - backend
      - wellness
    depends_on:
      - wellness_postgres
      - wellness_redis
    command: [ "sh", "-c", "uv run alembic upgrade head && uv run dramatiq worker.worker --processes 1" ]
    container_name: wellness_worker_prod

  wellness_postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - wellness_postgres_data:/var/lib/postgresql/data/
    networks:
      - wellness
    hostname: postgres
    container_name: wellness_postgres_prod

  wellness_redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    volumes:
      - wellness_redis_data:/data/
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - wellness
    hostname: redis
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    container_name: wellness_redis_prod

  kafka:
    image: confluentinc/cp-kafka:8.0.0
    restart: unless-stopped
    expose:
      - 9092
      - 9093
    environment:
      CLUSTER_ID: c2d43dcfdc15aba0c833dbfc46afe9cb
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
      - kafka_secrets:/etc/kafka/secrets
    networks:
      - backend
    container_name: kafka_prod

  mail:
    image: ghcr.io/j3rrryy/mind_journal:mail-latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - 8000
    env_file:
      - ./.env
    networks:
      - backend
    depends_on:
      - kafka
    container_name: mail_prod

  loki:
    image: grafana/loki:3.5
    restart: unless-stopped
    expose:
      - 3100
    volumes:
      - loki_data:/loki
      - ./loki.yml:/etc/loki/loki.yml:ro
    networks:
      - monitoring
    command: --config.file=/etc/loki/loki.yml
    container_name: loki_prod

  promtail:
    image: grafana/promtail:3.5
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail.yml:/etc/promtail/docker-config.yml:ro
    networks:
      - monitoring
    depends_on:
      - loki
    command: --config.file=/etc/promtail/docker-config.yml
    container_name: promtail_prod

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    expose:
      - 9090
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - nginx
      - backend
      - monitoring
    command: --config.file=/etc/prometheus/prometheus.yml
    container_name: prometheus_prod

  grafana:
    image: grafana/grafana:12.1.1
    restart: unless-stopped
    expose:
      - 3000
    env_file:
      - ./.env
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/admin/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - nginx
      - monitoring
    depends_on:
      - loki
      - promtail
      - prometheus
    container_name: grafana_prod
