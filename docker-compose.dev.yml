volumes:
  auth_postgres_data:
  auth_redis_data:
  wellness_postgres_data:
  wellness_redis_data:
  kafka_data:
  kafka_secrets:
  loki_data:
  prometheus_data:
  grafana_data:


networks:
  nginx:
  backend:
  auth:
  wellness:
  monitoring:


services:
  nginx-api:
    image: nginx:1.28.0-alpine
    profiles: [ "app" ]
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./dev/nginx.api.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nginx
    depends_on:
      - frontend
    container_name: nginx_api_dev

  nginx-all:
    image: nginx:1.28.0-alpine
    profiles: [ "all" ]
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./dev/nginx.all.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nginx
    depends_on:
      - frontend
    container_name: nginx_all_dev

  frontend:
    build:
      context: ./src/frontend/
      dockerfile: Dockerfile.dev
    profiles: [ "app", "all" ]
    restart: unless-stopped
    expose:
      - 3000
    env_file:
      - ./dev/.env.frontend
    environment:
      - API_URL=http://gateway:8000/api
    volumes:
      - ./src/frontend:/src/frontend
      - /src/frontend/node_modules
      - /src/frontend/.next
    networks:
      - nginx
    depends_on:
      - gateway
    container_name: frontend_dev

  gateway:
    build:
      context: ./src/backend/gateway/
    profiles: [ "app", "all" ]
    restart: unless-stopped
    expose:
      - 8000
    env_file:
      - ./dev/.env
    volumes:
      - ./src/backend/gateway/:/src/gateway/
    networks:
      - nginx
      - backend
    depends_on:
      - auth
      - wellness
      - mail
    container_name: gateway_dev

  auth:
    build:
      context: ./src/backend/auth/
    profiles: [ "app", "all" ]
    restart: unless-stopped
    expose:
      - 50051
      - 8000
    env_file:
      - ./dev/.env
    volumes:
      - ./src/backend/auth/:/src/auth/
    networks:
      - backend
      - auth
    depends_on:
      - auth_postgres
      - auth_redis
    container_name: auth_dev

  auth_postgres:
    image: postgres:17.5-alpine
    profiles: [ "app", "all" ]
    restart: unless-stopped
    env_file:
      - ./dev/.env
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data/
    networks:
      - auth
    hostname: postgres
    container_name: auth_postgres_dev

  auth_redis:
    image: redis:8.2-alpine
    profiles: [ "app", "all" ]
    restart: unless-stopped
    volumes:
      - auth_redis_data:/data/
      - ./dev/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - auth
    hostname: redis
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    container_name: auth_redis_dev

  wellness:
    build:
      context: ./src/backend/wellness/
    profiles: [ "app", "all" ]
    restart: unless-stopped
    expose:
      - 50051
      - 8000
    env_file:
      - ./dev/.env
    volumes:
      - ./src/backend/wellness/:/src/wellness/
    networks:
      - backend
      - wellness
    depends_on:
      - wellness_postgres
      - wellness_redis
    container_name: wellness_dev

  wellness_postgres:
    image: postgres:17.5-alpine
    profiles: [ "app", "all" ]
    restart: unless-stopped
    env_file:
      - ./dev/.env
    volumes:
      - wellness_postgres_data:/var/lib/postgresql/data/
    networks:
      - wellness
    hostname: postgres
    container_name: wellness_postgres_dev

  wellness_redis:
    image: redis:8.2-alpine
    profiles: [ "app", "all" ]
    restart: unless-stopped
    volumes:
      - wellness_redis_data:/data/
      - ./dev/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - wellness
    hostname: redis
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    container_name: wellness_redis_dev

  kafka:
    image: confluentinc/cp-kafka:8.0.0
    profiles: [ "app", "all" ]
    restart: unless-stopped
    expose:
      - 9092
      - 9093
    environment:
      CLUSTER_ID: c2d43dcfdc15aba0c833dbfc46afe9cb
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
      - kafka_secrets:/etc/kafka/secrets
    networks:
      - backend
    container_name: kafka_dev

  mail:
    build:
      context: ./src/backend/mail/
    profiles: [ "app", "all" ]
    restart: unless-stopped
    expose:
      - 8000
    env_file:
      - ./dev/.env
    volumes:
      - ./src/backend/mail/:/src/mail/
    networks:
      - backend
    depends_on:
      - kafka
    container_name: mail_dev

  loki:
    image: grafana/loki:3.5
    profiles: [ "all" ]
    restart: unless-stopped
    expose:
      - 3100
    volumes:
      - loki_data:/loki
      - ./dev/loki.yml:/etc/loki/loki.yml:ro
    networks:
      - monitoring
    command: --config.file=/etc/loki/loki.yml
    container_name: loki_dev

  promtail:
    image: grafana/promtail:3.5
    profiles: [ "all" ]
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./dev/promtail.yml:/etc/promtail/docker-config.yml:ro
    networks:
      - monitoring
    depends_on:
      - loki
    command: --config.file=/etc/promtail/docker-config.yml
    container_name: promtail_dev

  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: [ "all" ]
    restart: unless-stopped
    expose:
      - 9090
    volumes:
      - prometheus_data:/prometheus
      - ./dev/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - nginx
      - backend
      - monitoring
    command: --config.file=/etc/prometheus/prometheus.yml
    container_name: prometheus_dev

  grafana:
    image: grafana/grafana:12.1.1
    profiles: [ "all" ]
    restart: unless-stopped
    expose:
      - 3000
    env_file:
      - ./dev/.env
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/admin/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dev/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    networks:
      - nginx
      - monitoring
    depends_on:
      - loki
      - promtail
      - prometheus
    container_name: grafana_dev
